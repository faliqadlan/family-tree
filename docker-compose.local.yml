services:
  mysql:
    image: mysql:8.4
    container_name: silsilah_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: silsilah_keluarga
      MYSQL_USER: silsilah
      MYSQL_PASSWORD: silsilah_secret
    ports:
      - '3307:3306'
    volumes:
      - silsilah_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 10s
      timeout: 5s
      retries: 12

  neo4j:
    image: neo4j:5-community
    container_name: silsilah_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4j_secret
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - silsilah_neo4j_data:/data
      - silsilah_neo4j_logs:/logs
    healthcheck:
      test: ['CMD-SHELL', 'cypher-shell -u neo4j -p neo4j_secret "RETURN 1;" || exit 1']
      interval: 10s
      timeout: 10s
      retries: 15

volumes:
  silsilah_mysql_data:
  silsilah_neo4j_data:
  silsilah_neo4j_logs: